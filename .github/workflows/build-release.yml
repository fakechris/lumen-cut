name: Build and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $expected" >&2
            exit 1
          fi

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Install native test dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: command -v ffmpeg >/dev/null || brew install ffmpeg

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Build and package desktop release
        run: pnpm release:local

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lumen-cut-macos-arm64-${{ github.sha }}
          path: build/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: lumen-cut-macos-arm64-${{ github.sha }}
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "lumen-cut $GITHUB_REF_NAME"
          fi
