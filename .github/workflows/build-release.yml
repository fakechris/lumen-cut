name: Build and release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Test Python sidecars
        run: python3 -m unittest sidecars/asr/test_main.py sidecars/diarize/test_main.py

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $expected" >&2
            exit 1
          fi

      - name: Require Apple signing and notarization credentials for a release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            KEYCHAIN_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "Release tags require Apple signing/notarization secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Import Apple Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          certificate="$RUNNER_TEMP/lumen-cut-certificate.p12"
          keychain="$RUNNER_TEMP/lumen-cut-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security default-keychain -s "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -t 3600 -u "$keychain"
          security import "$certificate" \
            -k "$keychain" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain"
          identity="$(
            security find-identity -v -p codesigning "$keychain" \
              | awk -F'"' '/Developer ID Application/{print $2; exit}'
          )"
          if [[ -z "$identity" ]]; then
            echo "The imported certificate has no Developer ID Application identity." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "LUMEN_CUT_SIGNING_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
          rm -f "$certificate"

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Install native test dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        shell: bash
        run: |
          brew list --versions ffmpeg-full >/dev/null 2>&1 || brew install ffmpeg-full
          ffmpeg_bin="$(brew --prefix ffmpeg-full)/bin"
          echo "$ffmpeg_bin" >> "$GITHUB_PATH"
          "$ffmpeg_bin/ffmpeg" -hide_banner -filters 2>&1 \
            | grep -Eq '(^|[[:space:]])ass[[:space:]]'

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Build and package desktop release
        env:
          APPLE_ID: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_TEAM_ID || '' }}
        run: pnpm release:local

      - name: Verify signed and notarized tag artifacts
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          codesign --verify --deep --strict \
            src-tauri/target/release/bundle/macos/lumen-cut.app
          spctl --assess --type execute --verbose=2 \
            src-tauri/target/release/bundle/macos/lumen-cut.app
          xcrun stapler validate \
            src-tauri/target/release/bundle/macos/lumen-cut.app
          xcrun stapler validate \
            src-tauri/target/release/bundle/dmg/lumen-cut_*.dmg

      - name: Remove temporary signing keychain
        if: always() && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          security default-keychain -s login.keychain-db || true
          if [[ -n "${LUMEN_CUT_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$LUMEN_CUT_SIGNING_KEYCHAIN" || true
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lumen-cut-macos-arm64-${{ github.sha }}
          path: build/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: lumen-cut-macos-arm64-${{ github.sha }}
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "lumen-cut $GITHUB_REF_NAME"
          fi
